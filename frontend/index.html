<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazet AI</title>
    <link rel="stylesheet" href="/frontend/style.css">
</head>
<body>

<div class="app-wrapper">
    <div class="app-container">
        
        <!-- Profile Header Section -->
        <header id="profile-header">
            <div class="orb-wrap">
                <div class="orb-halo"></div>
                <div class="orb-ring"></div>
                <div class="orb-ring2"></div>
                <div class="orb"><span class="orb-letter">F</span></div>
            </div>
            <h1>Fazet AI</h1>
            <p>Intelligent Knowledge Assistant</p>
        </header>

        <!-- Main Content Card (The White Card) -->
        <main class="content-card">
            
            <!-- Chat Display Area -->
            <div id="chat-box" class="chat-display">
                <div class="ai-message-card">
                    <div class="ai-name">Fazet AI</div>
                    <div class="ai-body">
                        Hi! I'm here to answer any questions about Fazet products and services.
                    </div>
                </div>
            </div>

            <!-- Command Bar Area -->
            <div class="command-bar">
                <div class="input-container">
                    <span class="input-mic-icon">🎤</span>
                    <input
                        id="message"
                        type="text"
                        autocomplete="off"
                        placeholder="Ask anything about Fazet..."
                    >
                </div>
                <button id="send-btn" type="button">Send</button>
            </div>

        </main>

    </div>
</div>

<script src="/frontend/script.js" defer></script>
</body>
</html>
